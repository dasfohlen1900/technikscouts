

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Verdana, sans-serif; background: #0a0a12; color: #fff; }
  #app { display: flex; flex-direction: column; align-items: center; min-height: 400px; padding: 12px; user-select: none; }
  h1 { font-family: Verdana, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 4px; color: #aef; text-transform: uppercase; margin-bottom: 8px; }
  #scoreboard { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
  .player-score { text-align: center; }
  .player-name { font-size: 10px; color: #88aacc; letter-spacing: 2px; text-transform: uppercase; }
  .score-num { font-size: 36px; font-weight: 700; font-family: Verdana, sans-serif; line-height: 1; }
  .s-left { color: #4fc3f7; }
  .s-right { color: #f06292; }
  .divider { font-size: 24px; color: #334; }
  #canvas-wrap { position: relative; width: 100%; max-width: 560px; }
  canvas { display: block; width: 100%; border: 1px solid #223; border-radius: 4px; background: #080812; }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(8,8,18,0.82); border-radius: 4px; }
  #overlay h2 { font-family: Verdana, sans-serif; font-size: 14px; letter-spacing: 3px; color: #aef; margin-bottom: 8px; }
  #overlay p { font-family: Verdana, sans-serif; font-size: 11px; color: #88aacc; margin-bottom: 4px; text-align: center; }
  #overlay button { margin-top: 14px; font-family: Verdana, sans-serif; font-size: 12px; padding: 8px 24px; border: 1px solid #4fc3f7; background: transparent; color: #4fc3f7; border-radius: 3px; cursor: pointer; letter-spacing: 2px; }
  #overlay button:hover { background: #4fc3f720; }
  #controls { display: flex; gap: 12px; margin-top: 10px; align-items: flex-start; width: 100%; max-width: 560px; }
  .ctrl-box { flex: 1; background: #0d0d1e; border: 1px solid #1a2a3a; border-radius: 4px; padding: 8px 10px; }
  .ctrl-title { font-size: 9px; letter-spacing: 2px; color: #88aacc; text-transform: uppercase; margin-bottom: 5px; }
  .key-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .key { font-size: 10px; background: #1a2233; border: 1px solid #2a3a4a; border-radius: 3px; padding: 3px 6px; color: #ccc; }
  #touch-controls { display: none; width: 100%; max-width: 560px; margin-top: 10px; gap: 10px; }
  .touch-side { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .touch-btn { font-family: Verdana, sans-serif; font-size: 18px; padding: 14px; border-radius: 4px; border: none; cursor: pointer; font-weight: 700; }
  .t-up-l { background: #1a3050; color: #4fc3f7; }
  .t-dn-l { background: #1a3050; color: #4fc3f7; }
  .t-up-r { background: #301030; color: #f06292; }
  .t-dn-r { background: #301030; color: #f06292; }
  #highscores { width: 100%; max-width: 560px; margin-top: 12px; background: #0d0d1e; border: 1px solid #1a2a3a; border-radius: 4px; padding: 10px 14px; }
  #highscores h3 { font-family: Verdana, sans-serif; font-size: 10px; letter-spacing: 3px; color: #88aacc; text-transform: uppercase; margin-bottom: 8px; }
  #hs-list { font-size: 11px; }
  .hs-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #151525; color: #ccc; }
  .hs-row:last-child { border-bottom: none; }
  .hs-rank { color: #556; width: 18px; }
  .hs-names { flex: 1; }
  .hs-result { color: #88aacc; }
  @media (max-width: 500px) {
    #touch-controls { display: flex; }
    #controls { display: none; }
  }
</style>

<div id="app">
  <h1>Ping Pong</h1>
  <div id="scoreboard">
    <div class="player-score">
      <div class="player-name">Spieler 1</div>
      <div class="score-num s-left" id="sl">0</div>
    </div>
    <div class="divider">:</div>
    <div class="player-score">
      <div class="player-name">Spieler 2</div>
      <div class="score-num s-right" id="sr">0</div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c" width="560" height="320"></canvas>
    <div id="overlay">
      <h2>PING PONG</h2>
      <p>Spieler 1: W / S &nbsp;|&nbsp; Spieler 2: ↑ / ↓</p>
      <p>Erster Spieler mit 7 Punkten gewinnt</p>
      <button id="startBtn">STARTEN</button>
    </div>
  </div>
  <div id="controls">
    <div class="ctrl-box">
      <div class="ctrl-title" style="color:#4fc3f7">Spieler 1 (Links)</div>
      <div class="key-row"><span class="key">W</span> Hoch &nbsp; <span class="key">S</span> Runter</div>
    </div>
    <div class="ctrl-box">
      <div class="ctrl-title" style="color:#f06292">Spieler 2 (Rechts)</div>
      <div class="key-row"><span class="key">↑</span> Hoch &nbsp; <span class="key">↓</span> Runter</div>
    </div>
  </div>
  <div id="touch-controls">
    <div class="touch-side">
      <button class="touch-btn t-up-l" id="tul">▲ P1</button>
      <button class="touch-btn t-dn-l" id="tdl">▼ P1</button>
    </div>
    <div class="touch-side">
      <button class="touch-btn t-up-r" id="tur">P2 ▲</button>
      <button class="touch-btn t-dn-r" id="tdr">P2 ▼</button>
    </div>
  </div>
  <div id="highscores">
    <h3>Highscores</h3>
    <div id="hs-list"><div style="font-size:11px;color:#556;font-family:Verdana">Noch keine Spiele gespielt.</div></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 560, H = 320;
const PW = 10, PH = 60, PSPEED = 5, WIN = 7;
let animId, state = 'idle';
let p1y = H/2 - PH/2, p2y = H/2 - PH/2;
let bx, by, bdx, bdy, speed;
let s1 = 0, s2 = 0;
const keys = {};
const touchState = { ul:false, dl:false, ur:false, dr:false };
let highscores = JSON.parse(localStorage.getItem('pphs') || '[]');

function resetBall(dir) {
  bx = W/2; by = H/2;
  speed = 4;
  const ang = (Math.random() * 0.8 - 0.4);
  bdx = dir * speed * Math.cos(ang);
  bdy = speed * Math.sin(ang);
}

function draw() {
  ctx.fillStyle = '#080812';
  ctx.fillRect(0, 0, W, H);
  ctx.setLineDash([8, 10]);
  ctx.strokeStyle = '#1a2a3a';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#4fc3f7';
  ctx.fillRect(14, p1y, PW, PH);
  ctx.fillStyle = '#f06292';
  ctx.fillRect(W - 14 - PW, p2y, PW, PH);

  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(bx, by, 6, 0, Math.PI*2);
  ctx.fill();
}

function clampPaddle(y) {
  return Math.max(0, Math.min(H - PH, y));
}

function update() {
  if (keys['KeyW'] || touchState.ul) p1y = clampPaddle(p1y - PSPEED);
  if (keys['KeyS'] || touchState.dl) p1y = clampPaddle(p1y + PSPEED);
  if (keys['ArrowUp'] || touchState.ur) p2y = clampPaddle(p2y - PSPEED);
  if (keys['ArrowDown'] || touchState.dr) p2y = clampPaddle(p2y + PSPEED);

  bx += bdx; by += bdy;
  if (by - 6 <= 0) { by = 6; bdy = Math.abs(bdy); }
  if (by + 6 >= H) { by = H - 6; bdy = -Math.abs(bdy); }

  const p1Hit = bx - 6 <= 14 + PW && bx - 6 >= 14 && by >= p1y && by <= p1y + PH;
  const p2Hit = bx + 6 >= W - 14 - PW && bx + 6 <= W - 14 && by >= p2y && by <= p2y + PH;

  if (p1Hit) {
    bdx = Math.abs(bdx); speed = Math.min(speed + 0.3, 14);
    const rel = (by - (p1y + PH/2)) / (PH/2);
    bdy = rel * speed * 0.8;
    bdx = speed * Math.sqrt(1 - (bdy/speed)**2 * 0.6);
  }
  if (p2Hit) {
    bdx = -Math.abs(bdx); speed = Math.min(speed + 0.3, 14);
    const rel = (by - (p2y + PH/2)) / (PH/2);
    bdy = rel * speed * 0.8;
    bdx = -speed * Math.sqrt(1 - (bdy/speed)**2 * 0.6);
  }

  if (bx < 0) { s2++; document.getElementById('sr').textContent = s2; checkWin(2); resetBall(1); }
  if (bx > W) { s1++; document.getElementById('sl').textContent = s1; checkWin(1); resetBall(-1); }
}

function checkWin(winner) {
  if (s1 >= WIN || s2 >= WIN) {
    state = 'idle';
    cancelAnimationFrame(animId);
    saveHighscore(winner);
    showOverlay(winner);
  }
}

function saveHighscore(winner) {
  const entry = { winner, s1, s2, date: new Date().toLocaleDateString('de-DE') };
  highscores.unshift(entry);
  if (highscores.length > 8) highscores.pop();
  localStorage.setItem('pphs', JSON.stringify(highscores));
  renderHighscores();
}

function renderHighscores() {
  const el = document.getElementById('hs-list');
  if (!highscores.length) { el.innerHTML = '<div style="font-size:11px;color:#556;font-family:Verdana">Noch keine Spiele gespielt.</div>'; return; }
  el.innerHTML = highscores.map((h, i) => {
    const wname = h.winner === 1 ? '<span style="color:#4fc3f7">Spieler 1</span>' : '<span style="color:#f06292">Spieler 2</span>';
    return `<div class="hs-row"><span class="hs-rank">#${i+1}</span><span class="hs-names">${wname} gewinnt</span><span class="hs-result">${h.s1}:${h.s2} &nbsp; ${h.date}</span></div>`;
  }).join('');
}

function showOverlay(winner) {
  const ov = document.getElementById('overlay');
  const wname = winner === 1 ? 'Spieler 1' : 'Spieler 2';
  const col = winner === 1 ? '#4fc3f7' : '#f06292';
  ov.innerHTML = `<h2 style="color:${col}">${wname.toUpperCase()} GEWINNT!</h2><p style="font-size:13px;font-weight:700;margin-bottom:4px">${s1} : ${s2}</p><button id="startBtn">NOCHMAL</button>`;
  ov.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame() {
  s1 = 0; s2 = 0;
  document.getElementById('sl').textContent = '0';
  document.getElementById('sr').textContent = '0';
  p1y = H/2 - PH/2; p2y = H/2 - PH/2;
  document.getElementById('overlay').style.display = 'none';
  resetBall(Math.random() > 0.5 ? 1 : -1);
  state = 'playing';
  loop();
}

function loop() {
  if (state !== 'playing') return;
  update(); draw();
  animId = requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','Space'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);

function bindTouch(id, prop) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); touchState[prop] = true; }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); touchState[prop] = false; }, {passive:false});
  el.addEventListener('mousedown', () => touchState[prop] = true);
  el.addEventListener('mouseup', () => touchState[prop] = false);
}
bindTouch('tul','ul'); bindTouch('tdl','dl'); bindTouch('tur','ur'); bindTouch('tdr','dr');

document.getElementById('startBtn').addEventListener('click', startGame);
renderHighscores();
draw();
</script>
