<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Generator Pro</title>

<style>
body {
    font-family: Inter, system-ui;
    background: #f4f6f8;
    padding: 30px;
    max-width: 1000px;
    margin: auto;
    transition: 0.3s;
}

.dark {
    background: #121212;
    color: white;
}

h1 {
    margin-bottom: 20px;
}

select, input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.dark select, 
.dark input, 
.dark textarea {
    background: #1e1e1e;
    color: white;
    border: 1px solid #444;
}

textarea {
    min-height: 80px;
    resize: vertical;
}

button {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #1b5e20;
    color: white;
    font-weight: bold;
    margin-right: 10px;
    margin-bottom: 10px;
}

button:hover {
    background: #2e7d32;
}

pre {
    background: #111;
    color: #0f0;
    padding: 15px;
    border-radius: 10px;
    overflow-x: auto;
}

.theme-box {
    border: 2px solid #ddd;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.dark .theme-box {
    border-color: #444;
}
</style>
</head>
<body>

<h1>JSON Generator Pro</h1>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<h2>Fach & Klasse</h2>

<select id="fachSelect"></select>
<select id="klasseSelect"></select>

<hr>

<div id="themesContainer"></div>

<button onclick="addTheme()">+ Thema hinzufügen</button>
<button onclick="generateJSON()">JSON generieren</button>
<button onclick="downloadJSON()">Download JSON</button>

<h2>Vorschau</h2>
<pre id="output"></pre>

<script>

// Fächer & Klassen
const faecher = {
    "Deutsch": [5,6,7,8,9,10],
    "Mathe": [5,6,7,8,9,10],
    "Englisch": [5,6,7,8,9,10],
    "Biologie": [5,6,7,8,9,10],
    "Physik": [5,7,8,9,10],
    "Chemie": [6,7,8,9,10],
    "Erdkunde": [5,6,7,8,9,10],
    "Geschichte": [5,6,7,8,9,10],
    "Informatik": [5,9,10],
    "Latein": [6,7,8,9,10],
    "Französisch": [6,7,8,9,10],
    "3. Fremdsprachen": [10],
    "Religion": [5,6,7,8,9,10],
    "Kunst": [5,6,7,8,9,10],
    "Musik": [5,6,7,8,9,10],
    "Testphase": [1]
};

const fachSelect = document.getElementById("fachSelect");
const klasseSelect = document.getElementById("klasseSelect");
const themesContainer = document.getElementById("themesContainer");
let generatedData = null;

// Fach Dropdown befüllen
for (let fach in faecher) {
    const option = document.createElement("option");
    option.value = fach;
    option.textContent = fach;
    fachSelect.appendChild(option);
}

fachSelect.addEventListener("change", updateKlassen);

function updateKlassen() {
    klasseSelect.innerHTML = "";
    faecher[fachSelect.value].forEach(k => {
        const option = document.createElement("option");
        option.value = k;
        option.textContent = "Klasse " + k;
        klasseSelect.appendChild(option);
    });
}

updateKlassen();

// Thema hinzufügen
function addTheme() {
    const div = document.createElement("div");
    div.className = "theme-box";
    div.innerHTML = `
        <h3>Thema</h3>
        <input placeholder="Titel">
        <textarea placeholder="Beschreibung"></textarea>
        <h4>Unterthema</h4>
        <input placeholder="Unterthema Titel">
        <textarea placeholder="Punkte (eine Zeile = ein Punkt)"></textarea>
        <textarea placeholder="Links (Name | URL, eine Zeile pro Link)"></textarea>
    `;
    themesContainer.appendChild(div);
}

// JSON generieren
function generateJSON() {
    const themen = [];
    const boxes = document.querySelectorAll(".theme-box");

    boxes.forEach(box => {
        const inputs = box.querySelectorAll("input");
        const textareas = box.querySelectorAll("textarea");

        const titel = inputs[0].value;
        const beschreibung = textareas[0].value;
        const untertitel = inputs[1].value;

        const punkte = textareas[1].value
            .split("\n")
            .filter(p => p.trim() !== "");

        const links = textareas[2].value
            .split("\n")
            .filter(l => l.trim() !== "")
            .map(line => {
                const parts = line.split("|");
                return {
                    name: parts[0].trim(),
                    link: parts[1] ? parts[1].trim() : ""
                };
            });

        themen.push({
            titel,
            beschreibung,
            unterthemen: [
                {
                    titel: untertitel,
                    punkte
                },
                {
                    titel: "Weiterführende Links",
                    links
                }
            ]
        });
    });

    generatedData = { themen };

    document.getElementById("output").textContent =
        JSON.stringify(generatedData, null, 2);
}

// Download
function downloadJSON() {
    if (!generatedData) {
        alert("Bitte zuerst JSON generieren.");
        return;
    }

    const fach = fachSelect.value.toLowerCase().replace(/\s|\./g,"_");
    const klasse = klasseSelect.value;
    const fileName = `${fach}_${klasse}.json`;

    const blob = new Blob(
        [JSON.stringify(generatedData, null, 2)],
        { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    a.click();
}

// Dark Mode
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

addTheme();

</script>

</body>
</html>
