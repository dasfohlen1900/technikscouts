<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum – Ev. Gymnasium Nordhorn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf7;
    --surface2: #faf6ed;
    --border: #e2d9c8;
    --accent-info: #1a5276;
    --accent-chem: #6b3d2e;
    --accent-de:   #3d4a1e;
    --accent-lat:  #5c3a6b;
    --accent-math: #7a4100;
    --accent-en:   #1a4a3a;
    --accent-fr:   #6b1a2e;
    --accent-mu:   #1a3d5c;
    --text: #1c1a16;
    --text-muted: #7a7060;
    --check-done: #3a7d44;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 20px 28px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header .school {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── FILTER ROWS ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-row + .filter-row {
    margin-top: 8px;
  }

  .filter-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 52px;
  }

  .pills { display: flex; gap: 6px; flex-wrap: wrap; }

  .pill {
    padding: 5px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    color: var(--text-muted);
  }
  .pill:hover:not(:disabled) { border-color: #aaa; color: var(--text); }
  .pill:disabled { opacity: 0.35; cursor: default; }

  .pill.sel-class  { background: var(--text); border-color: var(--text); color: white; }
  .pill.sel-info   { background: var(--accent-info); border-color: var(--accent-info); color: white; }
  .pill.sel-chem   { background: var(--accent-chem); border-color: var(--accent-chem); color: white; }
  .pill.sel-de     { background: var(--accent-de);   border-color: var(--accent-de);   color: white; }
  .pill.sel-lat    { background: var(--accent-lat);  border-color: var(--accent-lat);  color: white; }
  .pill.sel-math   { background: var(--accent-math); border-color: var(--accent-math); color: white; }
  .pill.sel-en     { background: var(--accent-en);   border-color: var(--accent-en);   color: white; }
  .pill.sel-fr     { background: var(--accent-fr);   border-color: var(--accent-fr);   color: white; }
  .pill.sel-mu     { background: var(--accent-mu);   border-color: var(--accent-mu);   color: white; }

  /* subject row hidden until class chosen */
  #subjectRow { display: none; }

  /* ── SEARCH + RESET ── */
  .search-reset {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 340px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    padding: 8px 12px 8px 33px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: #aaa; }
  input[type="search"]::placeholder { color: var(--text-muted); }

  .action-btn {
    padding: 6px 12px;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 7px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: #aaa; color: var(--text); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 18px;
    padding: 9px 28px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 0.79rem;
    color: var(--text-muted);
    align-items: center;
    flex-wrap: wrap;
  }

  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--check-done); }
  .stat-dot.info { background: var(--accent-info); }
  .stat-dot.chem { background: var(--accent-chem); }
  .stat-dot.de   { background: var(--accent-de); }
  .stat-dot.lat  { background: var(--accent-lat); }
  .stat-dot.math { background: var(--accent-math); }
  .stat-dot.en   { background: var(--accent-en); }
  .stat-dot.fr   { background: var(--accent-fr); }
  .stat-dot.mu   { background: var(--accent-mu); }

  .progress-mini {
    height: 5px; width: 80px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--check-done);
    transition: width 0.4s ease;
  }

  /* ── PROMPT STATE ── */
  #promptState {
    text-align: center;
    padding: 70px 20px 40px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--text-muted);
  }

  #promptState .step2 { display: none; }

  /* ── MAIN ── */
  main {
    padding: 24px 28px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── SUBJECT BLOCK ── */
  .subject-block { margin-bottom: 32px; }

  .subject-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .subject-badge {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    padding: 3px 13px;
    border-radius: 6px;
    letter-spacing: -0.01em;
  }
  .badge-info { background: var(--accent-info); color: white; }
  .badge-chem { background: var(--accent-chem); color: white; }
  .badge-de   { background: var(--accent-de);   color: white; }
  .badge-lat  { background: var(--accent-lat);  color: white; }
  .badge-math { background: var(--accent-math); color: white; }
  .badge-en   { background: var(--accent-en);   color: white; }
  .badge-fr   { background: var(--accent-fr);   color: white; }
  .badge-mu   { background: var(--accent-mu);   color: white; }

  .subject-progress-text {
    font-size: 0.76rem;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* ── CLASS SECTION ── */
  .class-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .class-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 17px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1.5px solid var(--border);
    background: var(--surface2);
  }
  .class-header:hover { background: #f5f1e6; }

  .class-label {
    font-family: 'Fraunces', serif;
    font-size: 0.93rem;
    font-weight: 600;
  }

  .class-sub { font-size: 0.76rem; color: var(--text-muted); }

  .collapse-icon {
    margin-left: auto;
    color: var(--text-muted);
    transition: transform 0.22s;
    flex-shrink: 0;
  }
  .class-section.collapsed .collapse-icon { transform: rotate(-90deg); }
  .class-section.collapsed .class-body { display: none; }

  /* ── TOPIC ── */
  .topic {
    border-bottom: 1px solid var(--border);
    padding: 13px 17px;
  }
  .topic:last-child { border-bottom: none; }

  .topic-header {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    cursor: pointer;
  }

  .topic-title {
    font-weight: 500;
    font-size: 0.92rem;
    flex: 1;
    padding-top: 1px;
  }

  .topic-meta {
    display: flex;
    gap: 7px;
    align-items: center;
    flex-shrink: 0;
  }

  .duration-tag {
    font-size: 0.71rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--border);
    color: var(--text-muted);
    white-space: nowrap;
  }

  .klausur-tag {
    font-size: 0.71rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fde68a;
    white-space: nowrap;
  }

  /* CHECKBOX */
  .topic-check {
    appearance: none;
    -webkit-appearance: none;
    width: 19px; height: 19px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    margin-top: 1px;
    background: white;
  }
  .topic-check:checked {
    background: var(--check-done);
    border-color: var(--check-done);
  }
  .topic-check:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 2px;
    width: 6px; height: 10px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .topic-check:hover:not(:checked) { border-color: #aaa; }

  .topic.done { background: #f7fdf8; }
  .topic.done .topic-title {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: #b0c8b3;
  }

  /* DETAILS */
  .topic-details { margin-top: 10px; margin-left: 30px; display: none; }
  .topic-details.open { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
    gap: 8px;
    margin-top: 6px;
  }

  .detail-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
  }

  .detail-box h4 {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .detail-box ul { list-style: none; }
  .detail-box ul li {
    font-size: 0.81rem;
    padding: 2px 0 2px 10px;
    position: relative;
  }
  .detail-box ul li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--text-muted);
  }

  /* HIGHLIGHT */
  mark { background: #ffec9e; color: inherit; border-radius: 2px; padding: 0 1px; }

  /* LINKS BOX */
  .links-box {
    margin-top: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
  }

  .links-box h4 {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 7px;
  }

  .link-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .link-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.76rem;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .link-pill:hover { border-color: #888; background: white; color: var(--text); }

  .link-pill.anton   { border-color: #d4401a; color: #d4401a; }
  .link-pill.anton:hover { background: #fff4f1; }
  .link-pill.learning { border-color: #2563a8; color: #2563a8; }
  .link-pill.learning:hover { background: #f0f5ff; }
  .link-pill.zum     { border-color: #1a7a4a; color: #1a7a4a; }
  .link-pill.zum:hover { background: #f0faf4; }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.05rem;
    display: none;
  }

  @media (max-width: 600px) {
    header, main { padding-left: 14px; padding-right: 14px; }
    .stats-bar { padding-left: 14px; padding-right: 14px; }
    .detail-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📚 Schulcurriculum</h1>
    <span class="school">Ev. Gymnasium Nordhorn</span>
  </div>

  <!-- ROW 1: CLASS -->
  <div class="filter-row">
    <span class="filter-label">Klasse</span>
    <div class="pills" id="classPills">
      <button class="pill" data-class="kl5">5</button>
      <button class="pill" data-class="kl6">6</button>
      <button class="pill" data-class="kl7">7</button>
      <button class="pill" data-class="kl8">8</button>
      <button class="pill" data-class="kl9">9</button>
      <button class="pill" data-class="kl10">10</button>
      <button class="pill" data-class="ef">EF</button>
    </div>
  </div>

  <!-- ROW 2: SUBJECT (shown after class chosen) -->
  <div class="filter-row" id="subjectRow">
    <span class="filter-label">Fach</span>
    <div class="pills" id="subjectPills">
      <!-- filled dynamically -->
    </div>
  </div>

  <!-- SEARCH + RESET -->
  <div class="search-reset">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Themen durchsuchen…" autocomplete="off">
    </div>
    <button class="action-btn" id="clearBtn" title="Alle Abhakungen zurücksetzen">↺ Reset</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <span class="stat-dot"></span>
    <span id="statDone">0</span> / <span id="statTotal">0</span> abgehakt
  </div>
  <div class="progress-mini"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="stat-item" id="statInfoItem" style="display:none">
    <span class="stat-dot info"></span><span id="statInfo">–</span> Informatik
  </div>
  <div class="stat-item" id="statChemItem" style="display:none">
    <span class="stat-dot chem"></span><span id="statChem">–</span> Chemie
  </div>
  <div class="stat-item" id="statDeItem" style="display:none">
    <span class="stat-dot de"></span><span id="statDe">–</span> Deutsch
  </div>
  <div class="stat-item" id="statLatItem" style="display:none">
    <span class="stat-dot lat"></span><span id="statLat">–</span> Latein
  </div>
  <div class="stat-item" id="statMathItem" style="display:none">
    <span class="stat-dot math"></span><span id="statMath">–</span> Mathematik
  </div>
  <div class="stat-item" id="statEnItem" style="display:none">
    <span class="stat-dot en"></span><span id="statEn">–</span> Englisch
  </div>
  <div class="stat-item" id="statFrItem" style="display:none">
    <span class="stat-dot fr"></span><span id="statFr">–</span> Französisch
  </div>
  <div class="stat-item" id="statMuItem" style="display:none">
    <span class="stat-dot mu"></span><span id="statMu">–</span> Musik
  </div>
</div>

<main id="mainContent">
  <div id="promptState">
    <div class="step1">Wähle zuerst eine <strong>Klasse</strong> aus.</div>
    <div class="step2">Wähle jetzt ein <strong>Fach</strong> aus.</div>
  </div>
  <div class="empty-state" id="emptyState">Keine Themen gefunden.</div>
</main>

<script>
// ══════════════════════════════════════════════════════════════════════════════
//  CURRICULUM DATA

// ══════════════════════════════════════════════════════════════════════════════
//  BUILD SUBJECT PILLS
// ══════════════════════════════════════════════════════════════════════════════
function buildSubjectPills() {
  const row   = document.getElementById('subjectRow');
  const pills = document.getElementById('subjectPills');

  if (!activeClass) { row.style.display = 'none'; return; }

  const available = classesBySubject[activeClass] || [];
  if (available.length === 0) { row.style.display = 'none'; return; }

  pills.innerHTML = available.map(s => {
    const meta = subjectMeta[s];
    const isSel = activeSubject === s;
    return `<button class="pill${isSel ? ' '+meta.selClass : ''}" data-subject="${s}">${meta.label}</button>`;
  }).join('');

  row.style.display = 'flex';
}

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════════════════
function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function topicMatches(topic, q) {
  if (!q) return true;
  const lo = q.toLowerCase();
  return topic.title.toLowerCase().includes(lo) ||
    topic.lernfelder.some(x => x.toLowerCase().includes(lo)) ||
    topic.absprachen.some(x => x.toLowerCase().includes(lo)) ||
    topic.konkret.some(x => x.toLowerCase().includes(lo));
}

function buildLinksHtml(topic) {
  const links = topicLinks[topic.id];
  if (!links || links.length === 0) return '';
  const pills = links.map(l =>
    `<a class="link-pill ${l.type}" href="${l.url}" target="_blank" rel="noopener">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      ${l.label}
    </a>`
  ).join('');
  return `<div class="links-box"><h4>🔗 Übungsaufgaben & Materialien</h4><div class="link-pills">${pills}</div></div>`;
}


function render() {
  const main    = document.getElementById('mainContent');
  const prompt  = document.getElementById('promptState');
  const emptyEl = document.getElementById('emptyState');

  if (!activeClass) {
    prompt.style.display = 'block';
    prompt.querySelector('.step1').style.display = '';
    prompt.querySelector('.step2').style.display = 'none';
    emptyEl.style.display = 'none';
    main.querySelectorAll('.subject-block').forEach(e => e.remove());
    updateStats(0, 0, {});
    return;
  }
  if (!activeSubject) {
    prompt.style.display = 'block';
    prompt.querySelector('.step1').style.display = 'none';
    prompt.querySelector('.step2').style.display = '';
    emptyEl.style.display = 'none';
    main.querySelectorAll('.subject-block').forEach(e => e.remove());
    updateStats(0, 0, {});
    return;
  }
  prompt.style.display = 'none';

  const subj = curriculum.find(s => s.subject === activeSubject);
  if (!subj) { emptyEl.style.display = 'block'; return; }

  const cls = subj.classes.find(c => c.id === activeClass);
  if (!cls) { emptyEl.style.display = 'block'; return; }

  const matchingTopics = cls.topics.filter(t => topicMatches(t, searchQuery));
  if (matchingTopics.length === 0) {
    emptyEl.style.display = 'block';
    main.querySelectorAll('.subject-block').forEach(e => e.remove());
    updateStats(0, 0, {});
    return;
  }
  emptyEl.style.display = 'none';

  let total = 0, done = 0;
  let topicsHtml = '';

  for (const topic of matchingTopics) {
    total++;
    const isDone = !!checked[topic.id];
    if (isDone) done++;

    topicsHtml += `
      <div class="topic${isDone ? ' done' : ''}" id="topic-${topic.id}">
        <div class="topic-header" onclick="toggleDetails('${topic.id}')">
          <input type="checkbox" class="topic-check" id="chk-${topic.id}" ${isDone ? 'checked' : ''}
            onclick="event.stopPropagation();toggleCheck('${topic.id}')">
          <span class="topic-title">${highlight(topic.title, searchQuery)}</span>
          <div class="topic-meta">
            ${topic.klausur ? '<span class="klausur-tag">✏️ Klassenarbeit</span>' : ''}
            ${topic.duration && topic.duration !== '–' ? `<span class="duration-tag">⏱ ${topic.duration}</span>` : ''}
            <svg class="collapse-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="topic-details" id="details-${topic.id}">
          <div class="detail-grid">
            <div class="detail-box">
              <h4>Lernfelder / Schwerpunkte</h4>
              <ul>${topic.lernfelder.map(l => `<li>${highlight(l, searchQuery)}</li>`).join('')}</ul>
            </div>
            <div class="detail-box">
              <h4>Fachliche Absprachen</h4>
              <ul>${topic.absprachen.map(a => `<li>${highlight(a, searchQuery)}</li>`).join('')}</ul>
            </div>
            <div class="detail-box">
              <h4>Konkretisierung</h4>
              <ul>${topic.konkret.map(k => `<li>${highlight(k, searchQuery)}</li>`).join('')}</ul>
            </div>
          </div>
          ${buildLinksHtml(topic)}
        </div>
      </div>`;
  }

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const blockHtml = `
    <div class="subject-block" data-subject="${subj.subject}">
      <div class="subject-header">
        <span class="subject-badge badge-${subj.subject}">${subj.label} – ${cls.label}</span>
        <span class="subject-progress-text">${done}/${total} erledigt (${pct}%)</span>
      </div>
      <div class="class-section">
        <div class="class-body">${topicsHtml}</div>
      </div>
    </div>`;

  main.querySelectorAll('.subject-block').forEach(e => e.remove());
  main.insertAdjacentHTML('afterbegin', blockHtml);
  updateStats(total, done, { [activeSubject]: { total, done } });
}

// ── STATS ──
function updateStats(total, done, bySubj) {
  document.getElementById('statDone').textContent  = done;
  document.getElementById('statTotal').textContent = total;
  const pct = total > 0 ? (done / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  ['info', 'chem', 'de', 'lat', 'math', 'en', 'fr', 'mu'].forEach(s => {
    const key  = s.charAt(0).toUpperCase() + s.slice(1);
    const item = document.getElementById('stat' + key + 'Item');
    const span = document.getElementById('stat' + key);
    if (!item || !span) return;
    if (bySubj[s]) {
      item.style.display = 'flex';
      span.textContent = `${bySubj[s].done}/${bySubj[s].total}`;
    } else {
      item.style.display = 'none';
    }
  });
}

// ── LIVE CHECKBOX ──
function toggleCheck(id) {
  checked[id] = !checked[id];
  if (!checked[id]) delete checked[id];
  saveChecked();

  const topicEl = document.getElementById('topic-' + id);
  if (topicEl) {
    topicEl.classList.toggle('done', !!checked[id]);
  }

  // Recalculate stats from DOM
  let total = 0, done = 0;
  document.querySelectorAll('.topic-check').forEach(chk => {
    total++;
    if (chk.checked) done++;
  });
  if (activeSubject) {
    updateStats(total, done, { [activeSubject]: { total, done } });
  }
}

// ── TOGGLE DETAILS ──
function toggleDetails(id) {
  const det = document.getElementById('details-' + id);
  if (det) det.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ══════════════════════════════════════════════════════════════════════════════

// Class pills
document.getElementById('classPills').addEventListener('click', e => {
  const btn = e.target.closest('[data-class]');
  if (!btn) return;
  const cls = btn.dataset.class;

  if (activeClass === cls) {
    // Deselect
    activeClass   = null;
    activeSubject = null;
  } else {
    activeClass = cls;
    // Reset subject if it's not available for this class
    const available = classesBySubject[cls] || [];
    if (!available.includes(activeSubject)) activeSubject = null;
  }

  // Update class pill styles
  document.querySelectorAll('#classPills .pill').forEach(p => {
    p.classList.toggle('sel-class', p.dataset.class === activeClass);
  });

  buildSubjectPills();
  render();
});

// Subject pills (delegated)
document.getElementById('subjectPills').addEventListener('click', e => {
  const btn = e.target.closest('[data-subject]');
  if (!btn) return;
  const subj = btn.dataset.subject;

  activeSubject = activeSubject === subj ? null : subj;

  // Rebuild pills to reflect selection
  buildSubjectPills();
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// Reset
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Alle Abhakungen zurücksetzen?')) return;
  checked = {};
  saveChecked();
  render();
});

// ── Initial render ──
render();
</script>
